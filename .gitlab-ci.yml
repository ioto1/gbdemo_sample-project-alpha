# Project Alpha — CI Pipeline
#
# Includes the doc-converter pipeline to keep GitBook documentation
# in sync whenever docs change on the main branch.

include:
  - project: 'franka-dev/devportal/doc-converter'
    ref: main
    file: 'ci-templates/docs-pipeline.yml'

stages:
  - test
  - build
  - docs

variables:
  DOC_PROJECT_NAME: "alpha"
  DOC_SOURCE_DIR: "docs/"

# ── Application pipeline (unchanged) ──────────────────────────────────────────

test:
  stage: test
  image: golang:1.22
  script:
    - cd api && go test ./...
    - cd scheduler && go test ./...
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_BRANCH == "main"

build-web:
  stage: build
  image: node:20
  script:
    - cd web && npm ci && npm run build
  artifacts:
    paths:
      - web/dist/
  rules:
    - if: $CI_COMMIT_BRANCH == "main"

# ── Docs pipeline (from included template) ────────────────────────────────────

convert-docs:
  extends: .docs-conversion
  variables:
    DOC_PROJECT_NAME: "alpha"
    DOC_SOURCE_DIR: "docs/"
