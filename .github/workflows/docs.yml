# Project Alpha — Docs Pipeline
#
# Standalone workflow for doc-to-gitbook conversion.
# Triggers independently of test/build — only when docs/ change on main.

name: Docs

on:
  push:
    branches: [main]
    paths:
      - docs/**
      - .github/workflows/docs.yml

jobs:
  convert:
    uses: ioto1/gbdemo_doc-converter/.github/workflows/docs-conversion.yml@main
    with:
      project-name: alpha
      source-dir: docs/
    secrets:
      deploy-key: ${{ secrets.GITBOOK_DEPLOY_KEY }}
