# Project Alpha — CI Pipeline
#
# Runs Go tests and builds the web frontend on PRs and main pushes.
# Triggers doc-to-gitbook conversion when docs/ change on main.

name: CI

on:
  push:
    branches: [main]
    paths:
      - api/**
      - scheduler/**
      - web/**
      - docs/**
      - .github/workflows/ci.yml
  pull_request:
    paths:
      - api/**
      - scheduler/**
      - web/**
      - .github/workflows/ci.yml

jobs:
  test:
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request' || github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.22"
      - name: Test API
        run: cd api && go test ./...
      - name: Test Scheduler
        run: cd scheduler && go test ./...

  build-web:
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: web/package-lock.json
      - name: Build
        run: cd web && npm ci && npm run build
      - uses: actions/upload-artifact@v4
        with:
          name: web-dist
          path: web/dist/

  docs:
    needs: test
    if: github.ref == 'refs/heads/main'
    uses: ioto1/gbdemo_doc-converter/.github/workflows/docs-conversion.yml@main
    with:
      project-name: alpha
      source-dir: docs/
    secrets:
      deploy-key: ${{ secrets.GITBOOK_DEPLOY_KEY }}
