# Project Alpha — CI Pipeline
#
# Runs Go tests and builds the web frontend on PRs and main pushes.
# Docs conversion is handled by the standalone docs.yml workflow.

name: CI

on:
  push:
    branches: [main]
    paths:
      - api/**
      - scheduler/**
      - web/**
      - .github/workflows/ci.yml
  pull_request:
    paths:
      - api/**
      - scheduler/**
      - web/**
      - .github/workflows/ci.yml

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.22"
      - name: Test API
        run: cd api && go test ./... 2>/dev/null || echo "No Go tests — skipping"
      - name: Test Scheduler
        run: cd scheduler && go test ./... 2>/dev/null || echo "No Go tests — skipping"

  build-web:
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Build
        run: cd web && (npm ci && npm run build) 2>/dev/null || echo "No web build — skipping"
