<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" width="800" height="400">
  <rect width="800" height="400" fill="#0d1117"/>
  
  <!-- Project Repos -->
  <rect x="30" y="30" width="160" height="60" rx="8" fill="#238636"/>
  <text x="110" y="55" text-anchor="middle" fill="white" font-family="sans-serif" font-size="13" font-weight="bold">Project Alpha</text>
  <text x="110" y="75" text-anchor="middle" fill="#c9d1d9" font-family="sans-serif" font-size="11">docs/*.md</text>

  <rect x="30" y="110" width="160" height="60" rx="8" fill="#238636"/>
  <text x="110" y="135" text-anchor="middle" fill="white" font-family="sans-serif" font-size="13" font-weight="bold">Project Beta</text>
  <text x="110" y="155" text-anchor="middle" fill="#c9d1d9" font-family="sans-serif" font-size="11">docs/*.md</text>

  <rect x="30" y="190" width="160" height="60" rx="8" fill="#238636"/>
  <text x="110" y="215" text-anchor="middle" fill="white" font-family="sans-serif" font-size="13" font-weight="bold">Project Gamma</text>
  <text x="110" y="235" text-anchor="middle" fill="#c9d1d9" font-family="sans-serif" font-size="11">docs/*.md</text>

  <!-- Arrows from repos to CI -->
  <line x1="190" y1="60" x2="280" y2="160" stroke="#58a6ff" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="190" y1="140" x2="280" y2="175" stroke="#58a6ff" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="190" y1="220" x2="280" y2="190" stroke="#58a6ff" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- GitLab CI -->
  <rect x="290" y="120" width="160" height="110" rx="8" fill="#f0883e"/>
  <text x="370" y="155" text-anchor="middle" fill="white" font-family="sans-serif" font-size="14" font-weight="bold">GitLab CI</text>
  <text x="370" y="175" text-anchor="middle" fill="#fff" font-family="sans-serif" font-size="11">Detects docs/ changes</text>
  <text x="370" y="195" text-anchor="middle" fill="#fff" font-family="sans-serif" font-size="11">on main branch</text>
  <text x="370" y="215" text-anchor="middle" fill="#fff" font-family="sans-serif" font-size="11">→ triggers converter</text>

  <!-- Arrow to Converter -->
  <line x1="450" y1="175" x2="530" y2="175" stroke="#58a6ff" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Doc Converter -->
  <rect x="540" y="120" width="160" height="110" rx="8" fill="#8957e5"/>
  <text x="620" y="155" text-anchor="middle" fill="white" font-family="sans-serif" font-size="14" font-weight="bold">Doc Converter</text>
  <text x="620" y="175" text-anchor="middle" fill="#d2a8ff" font-family="sans-serif" font-size="11">Docker Container</text>
  <text x="620" y="195" text-anchor="middle" fill="#d2a8ff" font-family="sans-serif" font-size="11">Markdown → GitBook</text>
  <text x="620" y="215" text-anchor="middle" fill="#d2a8ff" font-family="sans-serif" font-size="11">Copies assets</text>

  <!-- Arrow to GitBook -->
  <line x1="620" y1="230" x2="620" y2="280" stroke="#58a6ff" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- GitBook Content -->
  <rect x="460" y="290" width="320" height="70" rx="8" fill="#1f6feb"/>
  <text x="620" y="320" text-anchor="middle" fill="white" font-family="sans-serif" font-size="15" font-weight="bold">GitBook Content Repo</text>
  <text x="620" y="342" text-anchor="middle" fill="#a5d8ff" font-family="sans-serif" font-size="12">Served at https://docs.franka.de</text>

  <!-- Arrow marker definition -->
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="10" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M0,0 L10,5 L0,10 Z" fill="#58a6ff"/>
    </marker>
  </defs>
</svg>
